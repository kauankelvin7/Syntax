    <!-- Prevenir zoom em inputs no iOS -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    
    <title>Cinesia Fisio</title>
    
    <!-- Tema: Detecta preferência salva ou do sistema -->
    <script>
      (function() {
        var theme = localStorage.getItem('cinesia-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.add('light');
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
    
    <!-- CSS para safe areas no iPad -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      body {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }
      /* Área de toque mínima para tablet */
      button, a, [role="button"] {
        min-height: 44px;
        min-width: 44px;
      }
    </style>
    <!-- Splash Screen Premium -->
    <style>
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #115e59 0%, #0f172a 60%);
        font-family: 'Sora', sans-serif;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: fadeUp 0.8s ease-out;
      }
      .splash-logo-container {
        position: relative;
        margin-bottom: 1.5rem;
      }
      .splash-logo {
        width: 88px;
        height: 88px;
        position: relative;
        z-index: 2;
        animation: float 3s ease-in-out infinite;
      }
      .splash-glow {
        position: absolute;
        inset: 0;
        background: #14b8a6;
        filter: blur(20px);
        opacity: 0.4;
        border-radius: 50%;
        animation: pulseGlow 2.5s ease-in-out infinite;
      }
      .splash-title {
        color: #ffffff;
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        margin: 0;
        text-shadow: 0 4px 12px rgba(0,0,0,0.3);
      }
      .splash-subtitle {
        color: #94a3b8;
        font-size: 1rem;
        font-weight: 400;
        margin-top: 0.5rem;
        margin-bottom: 2.5rem;
        letter-spacing: 0.02em;
      }
      .splash-loader {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(20, 184, 166, 0.15);
        border-radius: 50%;
        border-top-color: #14b8a6;
        animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes pulseGlow {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.4); opacity: 0.6; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="pwa-splash">
      <div class="splash-content">
        <div class="splash-logo-container">
          <div class="splash-glow"></div>
          <img src="/pwa-192x192.png" class="splash-logo" alt="Logo Cinesia" />
        </div>
        <h1 class="splash-title">Cinesia</h1>
        <p class="splash-subtitle">Seu parceiro de estudos</p>
        <div class="splash-loader"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
