<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Syntax - Advanced Engineering Study System | Resumos, Flashcards e Simulados IA" />
    <meta name="theme-color" content="#020617" />
    <meta name="author" content="Kauan Kelvin" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Syntax" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <meta name="build-version" content="%VITE_BUILD_TIME%" />
    
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    
    <title>Syntax | Software Engineering Hub</title>
    
    <script>
      (function() {
        var theme = localStorage.getItem('syntax-theme');
        var isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(isDark ? 'dark' : 'light');
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
    
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
      }
      body {
        margin: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none;
        background-color: #020617; /* Slate-950 */
      }
      /* Tablet-ready touch targets */
      button, a, [role="button"] {
        min-height: 44px;
        min-width: 44px;
      }
    </style>

    <style>
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        font-family: 'Inter', system-ui, sans-serif;
        transition: opacity 0.6s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.6s;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: bootFadeUp 1s ease-out forwards;
      }
      .logo-node {
        position: relative;
        width: 96px;
        height: 96px;
        margin-bottom: 2rem;
      }
      .logo-img {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 10;
        animation: nodeFloat 4s ease-in-out infinite;
      }
      .logo-glow {
        position: absolute;
        inset: -10px;
        background: #6366f1;
        filter: blur(25px);
        opacity: 0.3;
        border-radius: 50%;
        animation: nodePulse 3s ease-in-out infinite;
      }
      .splash-title {
        color: #ffffff;
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: -0.05em;
        margin: 0;
        text-transform: uppercase;
        font-style: italic;
      }
      .splash-status {
        color: #64748b;
        font-size: 0.75rem;
        font-weight: 800;
        margin-top: 0.75rem;
        margin-bottom: 3rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
      }
      .boot-loader {
        width: 48px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }
      .boot-progress {
        position: absolute;
        height: 100%;
        width: 40%;
        background: #06b6d4;
        box-shadow: 0 0 15px #06b6d4;
        border-radius: 10px;
        animation: bootProgress 1.5s infinite ease-in-out;
      }

      @keyframes nodeFloat {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-12px) rotate(2deg); }
      }
      @keyframes nodePulse {
        0%, 100% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.3); opacity: 0.5; }
      }
      @keyframes bootProgress {
        0% { left: -40%; }
        100% { left: 110%; }
      }
      @keyframes bootFadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="pwa-splash">
      <div class="splash-content">
        <div class="logo-node">
          <div class="logo-glow"></div>
          <img src="/apple-touch-icon.png" class="logo-img" alt="Syntax Engine" />
        </div>
        <h1 class="splash-title">Syntax</h1>
        <p class="splash-status">Initializing_System_Core</p>
        <div class="boot-loader">
          <div class="boot-progress"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
